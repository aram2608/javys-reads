<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Rebel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --ink: #0e0e0e;
            --paper: #f2ead8;
            --red: #b01e1e;
            --rust: #8c3a1a;
            --pale-red: #d9534f;
            --gray: #3a3530;
            --mid: #7a7060;
            --dim: #a09080;
            --bg: #111008;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--paper);
            font-family: 'Space Mono', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Stark horizontal lines - like a manifesto pamphlet */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(180deg,
                    transparent,
                    transparent 59px,
                    rgba(242, 234, 216, 0.025) 59px,
                    rgba(242, 234, 216, 0.025) 60px);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--red);
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }

        /* Header */
        header {
            margin-bottom: 60px;
            animation: fadeIn 0.8s ease both;
        }

        .masthead {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 8px;
        }

        .red-block {
            width: 4px;
            background: var(--red);
            flex-shrink: 0;
            align-self: stretch;
            min-height: 80px;
        }

        .masthead-text {}

        .eyebrow {
            font-size: 9px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Libre Baskerville', serif;
            font-size: clamp(2rem, 7vw, 3.6rem);
            font-weight: 700;
            line-height: 1;
            color: var(--paper);
            letter-spacing: -0.01em;
        }

        h1 span {
            color: var(--red);
            font-style: italic;
        }

        .fr-title {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 0.95rem;
            color: var(--dim);
            margin-top: 6px;
        }

        .byline {
            margin-top: 16px;
            font-size: 9px;
            letter-spacing: 0.3em;
            color: var(--mid);
            text-transform: uppercase;
            padding-left: 24px;
        }

        /* Progress */
        .status-row {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 6px;
            animation: fadeIn 0.8s 0.3s both;
        }

        .prog-track {
            height: 2px;
            background: rgba(242, 234, 216, 0.07);
            margin-bottom: 44px;
            animation: fadeIn 0.8s 0.3s both;
        }

        .prog-fill {
            height: 100%;
            background: var(--red);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* Card */
        .q-card {
            background: rgba(242, 234, 216, 0.025);
            border-top: 2px solid var(--red);
            border-bottom: 1px solid rgba(242, 234, 216, 0.07);
            padding: 30px 32px 28px;
            margin-bottom: 18px;
            animation: slideUp 0.35s ease both;
            position: relative;
        }

        .q-tag {
            font-size: 8px;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--red);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .q-text {
            font-family: 'Libre Baskerville', serif;
            font-size: 1.08rem;
            line-height: 1.7;
            color: var(--paper);
            margin-bottom: 24px;
        }

        .q-num {
            position: absolute;
            top: 12px;
            right: 18px;
            font-family: 'Libre Baskerville', serif;
            font-size: 4rem;
            font-weight: 700;
            font-style: italic;
            color: rgba(242, 234, 216, 0.03);
            line-height: 1;
        }

        /* Options */
        .opts {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .opt {
            background: transparent;
            border: 1px solid rgba(242, 234, 216, 0.1);
            padding: 12px 16px;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
            font-size: 0.82rem;
            color: rgba(242, 234, 216, 0.65);
            text-align: left;
            display: grid;
            grid-template-columns: 22px 1fr;
            gap: 8px;
            align-items: start;
            transition: all 0.15s ease;
            position: relative;
            overflow: hidden;
        }

        .opt:hover:not(.disabled) {
            border-color: var(--red);
            color: var(--paper);
            background: rgba(176, 30, 30, 0.06);
        }

        .opt-ltr {
            font-size: 9px;
            color: var(--mid);
            padding-top: 2px;
        }

        .opt-txt {
            line-height: 1.55;
        }

        .opt.correct {
            border-color: rgba(242, 234, 216, 0.5);
            background: rgba(242, 234, 216, 0.05);
            color: var(--paper);
        }

        .opt.correct .opt-ltr {
            color: var(--paper);
        }

        .opt.wrong {
            border-color: rgba(176, 30, 30, 0.4);
            background: rgba(176, 30, 30, 0.06);
            color: rgba(242, 234, 216, 0.3);
            text-decoration: line-through;
            text-decoration-color: rgba(176, 30, 30, 0.4);
        }

        .opt.disabled {
            cursor: default;
            pointer-events: none;
        }

        /* Explanation */
        .expl {
            display: none;
            margin-top: 18px;
            padding: 14px 16px;
            border-left: 2px solid var(--red);
            background: rgba(176, 30, 30, 0.05);
            font-size: 0.82rem;
            line-height: 1.8;
            color: rgba(242, 234, 216, 0.65);
            animation: fadeIn 0.3s ease both;
            font-style: italic;
        }

        .expl.show {
            display: block;
        }

        .expl strong {
            color: var(--paper);
            font-style: normal;
        }

        /* Nav */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 24px;
            border-top: 1px solid rgba(242, 234, 216, 0.06);
            animation: fadeIn 0.6s 0.2s both;
        }

        .live {
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--dim);
            text-transform: uppercase;
        }

        .btn {
            background: transparent;
            border: 1px solid rgba(242, 234, 216, 0.15);
            color: rgba(242, 234, 216, 0.6);
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            padding: 12px 22px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .btn:hover {
            border-color: var(--red);
            color: var(--paper);
        }

        .btn.p {
            background: var(--red);
            border-color: var(--red);
            color: var(--paper);
        }

        .btn.p:hover {
            background: #8c1515;
            border-color: #8c1515;
        }

        .btn:disabled {
            opacity: 0.2;
            pointer-events: none;
        }

        /* Results */
        .results {
            display: none;
            animation: slideUp 0.5s ease both;
        }

        .results.show {
            display: block;
        }

        .results-header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 36px;
        }

        .r-bar {
            width: 4px;
            background: var(--red);
            align-self: stretch;
            min-height: 100px;
            flex-shrink: 0;
        }

        .score-big {
            font-family: 'Libre Baskerville', serif;
            font-size: clamp(3.5rem, 14vw, 6rem);
            font-weight: 700;
            color: var(--paper);
            line-height: 1;
            margin-bottom: 4px;
        }

        .score-big span {
            color: var(--red);
            font-style: italic;
        }

        .score-sub {
            font-size: 9px;
            letter-spacing: 0.3em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .verdict {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--paper);
            margin-bottom: 10px;
        }

        .v-note {
            font-size: 0.82rem;
            line-height: 1.85;
            color: var(--dim);
            max-width: 460px;
            margin-bottom: 36px;
        }

        .breakdown {
            border-top: 2px solid var(--red);
            padding-top: 20px;
            margin-bottom: 32px;
        }

        .bd-head {
            font-size: 8px;
            letter-spacing: 0.35em;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .bd-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 9px 0;
            border-bottom: 1px solid rgba(242, 234, 216, 0.05);
            font-size: 0.79rem;
        }

        .bd-row:last-child {
            border-bottom: none;
        }

        .bd-q {
            color: var(--dim);
            flex: 1;
            line-height: 1.5;
        }

        .bd-m {
            flex-shrink: 0;
            font-size: 13px;
        }

        .tick {
            color: var(--paper);
        }

        .cross {
            color: var(--red);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 580px) {
            .q-card {
                padding: 22px 18px;
            }

            .masthead {
                gap: 14px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <div class="masthead">
                <div class="red-block"></div>
                <div class="masthead-text">
                    <div class="eyebrow">Albert Camus · 1951</div>
                    <h1>The <span>Rebel</span></h1>
                    <div class="fr-title">L'Homme révolté</div>
                </div>
            </div>
        </header>

        <div id="quiz-root"> </div>

    </div>

    <script>
        window.QUIZ = {
            questions: [
                {
                    tag: "Opening Argument",
                    q: "Camus opens the book with a question analogous to the one he asked in The Myth of Sisyphus. What is it?",
                    opts: [
                        "Is political revolution ever justified?",
                        "If nothing is true, is everything permitted? - and what does rebellion tell us about the answer?",
                        "Can a just society be built without God?",
                        "Is history moving toward freedom or toward tyranny?"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Just as Camus opens <em>The Myth of Sisyphus</em> with the question of suicide, he opens <em>The Rebel</em> by asking whether, if life is absurd and nothing is sacred, murder and total violence become permissible. Rebellion, the act of saying 'no', turns out to contain within it the seed of an answer."
                },
                {
                    tag: "The Rebel's Logic",
                    q: "When a slave rises up and says 'no' to the master, Camus argues this act of rebellion implies something positive. What?",
                    opts: [
                        "A desire to seize power for himself",
                        "A recognition that some value - some limit, exists that must not be violated, which the slave shares with all humanity",
                        "A rational calculation that the costs of submission outweigh its benefits",
                        "A Nietzschean will to power asserting itself"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> For Camus, rebellion is not mere negation. When someone says 'this far and no further,' they are implicitly affirming that something has value worth defending. Human dignity becomes the foundation of Camus's ethics. Rebellion creates solidarity: I rebel, therefore we are is his main argument."
                },
                {
                    tag: "Metaphysical Rebellion",
                    q: "Camus distinguishes historical rebellion from 'metaphysical rebellion.' What is metaphysical rebellion?",
                    opts: [
                        "Revolution aimed at overthrowing capitalism and economic structures",
                        "The revolt of man against the conditions of his existence, against death, suffering, and a creation that seems unjust",
                        "The attempt to build a utopian society based on reason alone",
                        "Nietzsche's proclamation of the death of God"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Metaphysical rebellion is the deeper revolt, not against a specific master, but against existence itself, against the fact of mortality and suffering. Camus traces this from the Marquis de Sade through Romanticism, Nietzsche, and Stirner. It is the precondition and temptation that haunts political rebellion."
                },
                {
                    tag: "The Danger",
                    q: "Camus's central argument is that modern revolutions, French and Russian, betray their origins and become murderous. What is the key mechanism of this betrayal?",
                    opts: [
                        "Revolutionary leaders are inevitably corrupted by power",
                        "Rebellion, which begins by affirming a limit, gets infected by nihilism or utopianism and sacrifices present human lives for an abstract future ideal",
                        "The masses are too uneducated to sustain revolutionary principles",
                        "Economic pressures force revolutions to become authoritarian"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> This is the book's spine. Rebellion says 'no' on behalf of a human value. But when it becomes a total revolution aimed at remaking history entirely, it begins killing in the name of the future. The limit disappears. Present suffering is justified by tomorrow's utopia. Camus calls this the logic of murder."
                },
                {
                    tag: "History & Ideology",
                    q: "Camus coins a phrase for the ideology that treats History itself as the supreme judge and justification for all action. What is it?",
                    opts: [
                        "Historical materialism",
                        "Totalitarian rationalism",
                        "The religion of history / historical absolutism",
                        "Revolutionary consequentialism"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> Camus argues that modern totalitarianism, particularly Stalinist Marxism, functions as a secular religion in which History plays the role of God: the final arbiter that will vindicate all sacrifices. Since the end is guaranteed by historical laws, any means become permissible. This is, for Camus, the great secular heresy of the 20th century."
                },
                {
                    tag: "Nietzsche",
                    q: "Camus has a complex reading of Nietzsche. He credits Nietzsche with diagnosing nihilism, but what does he accuse Nietzsche of enabling?",
                    opts: [
                        "Providing the intellectual foundation for fascism through the will to power and the Übermensch",
                        "Replacing God with an equally absolute, and ultimately nihilistic, worship of historical destiny and power",
                        "Undermining the possibility of political solidarity by his radical individualism",
                        "Failing to develop a positive ethics to replace the Christian morality he destroyed"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Camus is careful not to blame Nietzsche for Nazism crudely. His deeper charge is that Nietzsche's thought - despite his intentions, cleared the way for the divinization of power and fate, which could be annexed by those who worshipped historical necessity. The death of God left a vacuum that history and power rushed to fill."
                },
                {
                    tag: "The Russian Nihilists",
                    q: "Camus spends considerable time on the 19th-century Russian revolutionary terrorists, the Narodnaya Volya and figures like Kaliayev. Why does he hold them up with a kind of admiration?",
                    opts: [
                        "Because their violence was effective in bringing down the Tsar",
                        "Because they killed for a principle but felt the full weight of that killing, willing to die themselves as payment, preserving a moral limit even in violence",
                        "Because they were atheists who rejected all metaphysical comfort",
                        "Because they represent the purest form of anarchist thought"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Kaliayev, who assassinated a Grand Duke and then willingly faced execution, exemplifies for Camus a tragic but morally serious form of rebellion. He killed for a cause but did not pretend the killing was clean, he accepted his own death as the price. This is contrasted sharply with 20th-century totalitarian murder, which kills without scruple and in the name of abstraction."
                },
                {
                    tag: "Critique of Marxism",
                    q: "Camus does not reject socialism or concern for workers. What is his specific philosophical objection to Marxism-Leninism?",
                    opts: [
                        "That it misunderstands economics and the market",
                        "That it is atheist and therefore cannot ground genuine ethics",
                        "That it treats history as a science with guaranteed outcomes, which justifies present violence for a future that may never arrive",
                        "That it ignores individual psychology in favor of class analysis"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> Camus's critique is philosophical, not economic. By claiming that history obeys scientific laws and that the communist endpoint is inevitable, Marxism-Leninism licenses unlimited violence in the present. For Camus, this certainty is itself a form of metaphysical arrogance - and it is what turns revolution into terror."
                },
                {
                    tag: "Revolt vs. Revolution",
                    q: "Camus draws a sharp distinction between 'revolt' and 'revolution.' How does he characterize the difference?",
                    opts: [
                        "Revolt is spontaneous; revolution is organized and planned",
                        "Revolt maintains the tension between yes and no, preserving limits; revolution seeks total transformation and abolishes limits in pursuit of an absolute end",
                        "Revolt is individual; revolution is collective",
                        "Revolt is romantic and impractical; revolution is the mature form of political action"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Revolt is perpetual, it lives in the ongoing tension between what is and what should be, never resolving into a final answer. Revolution claims to end history, to build the permanent kingdom. For Camus, this totalizing ambition is the seed of terror. True rebellion accepts that the struggle never ends."
                },
                {
                    tag: "Mediterranean Thought",
                    q: "In the final section, Camus contrasts what he calls 'Mediterranean thought' or 'meridional thought' with the Germanic/historical tradition. What does he mean by this?",
                    opts: [
                        "A preference for classical Greek democracy over modern parliamentary systems",
                        "A sensibility rooted in nature, limits, and the noon-time sun, embracing the present and concrete human life rather than sacrificing it to historical abstractions",
                        "A regionalist political program for Southern European nations",
                        "A literary style opposed to German Romanticism"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> This is one of Camus's most personal passages. Against the cold logic of historical necessity and the violence of total revolution, he invokes the Mediterranean, sun, sea, measure, the present tense."
                },
                {
                    tag: "Sartre Controversy",
                    q: "The Rebel sparked a famous and bitter public rupture between Camus and Sartre. What was the core of Sartre's (and Jeanson's) criticism?",
                    opts: [
                        "That Camus's writing was aesthetically inferior to existentialist literature",
                        "That Camus's critique of revolution was politically irresponsible, effectively providing cover for anti-communist Cold War politics and abandoning the working class",
                        "That Camus had plagiarized ideas from Hegel and Marx without attribution",
                        "That Camus's Mediterranean ethics was a form of French imperialism"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> The Sartre-Camus split of 1952 was one of the defining intellectual events of postwar France. Sartre and Jeanson argued that in the concrete political context of the Cold War, Camus's anti-Soviet critique aligned him objectively with American imperialism. Camus responded furiously that intellectual honesty required criticizing terror wherever it appeared."
                },
                {
                    tag: "Synthesis",
                    q: "If The Myth of Sisyphus ends with 'one must imagine Sisyphus happy,' what is the equivalent affirmation that The Rebel arrives at?",
                    opts: [
                        "One must imagine the revolutionary victorious",
                        "One must choose between being a victim or an executioner, there is no third option",
                        "Rebellion is the refusal to be either executioner or victim, solidarity in shared limits is the only ground for a human ethics",
                        "History will ultimately vindicate those who rebel with pure motives"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> The Rebel's culminating move is to insist on a third position: neither the resigned victim nor the revolutionary executioner. Rebellion affirms human dignity without becoming murder. 'I rebel, therefore we are', the solidarity implied in saying 'no' to oppression is the closest Camus comes to a political ethics, grounded in the shared human refusal of humiliation."
                }
            ],
            verdicts: [
                {
                    min: 1.0,
                    v: "Neither executioner nor victim.",
                    n: "Perfect. You understand not just what Camus concludes but why he had to write the book at all.",
                },
                {
                    min: 0.75,
                    v: "A serious rebel.",
                    n: "Strong command of the book's architecture. The finer distinctions between revolt and revolution may benefit from a second pass through the later chapters.",
                },
                {
                    min: 0.5,
                    v: "The stone is still moving.",
                    n: "You have the shape of the argument but some of the philosophical subtleties remain unclear. The introduction and the final section could use a re-read.",
                },
                {
                    min: 0.0,
                    v: "Back to the beginning.",
                    n: "The Rebel is a challenging book indeed. Re-read the introduction, it summarizes his argument best.",
                },
            ],
        }
    </script>

    <script src="../quiz-engine.js"></script>
</body>

</html>
