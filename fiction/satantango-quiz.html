<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sátántangó</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            /* palette */
            --bg: #0c0a07;
            --paper: #c4bfb0;
            --pale: #ddd8cc;
            --dim: #6b6358;
            --mid: #8a7d6e;
            --rust: #7a4f2a;
            --rust-hi: #a06838;
            --amber: #c8904a;
            --border: rgba(196, 191, 176, 0.09);
            --border-hi: rgba(196, 191, 176, 0.22);

            /* engine vars */
            --qe-font-serif: 'IM Fell English', serif;
            --qe-font-body: 'Courier Prime', monospace;
            --qe-font-label: 'Courier Prime', monospace;
            --qe-surface: rgba(196, 191, 176, 0.022);
            --qe-border: var(--border);
            --qe-border-hi: var(--border-hi);
            --qe-text: var(--pale);
            --qe-text-muted: var(--dim);
            --qe-accent: var(--rust);
            --qe-accent-lo: rgba(122, 79, 42, 0.07);
            --qe-btn-bg: var(--rust);
            --qe-btn-text: var(--pale);
            --qe-btn-hover-bg: var(--rust-hi);
            --qe-btn-hover-text: var(--pale);
            --qe-correct: var(--pale);
            --qe-correct-bg: rgba(196, 191, 176, 0.04);
            --qe-wrong: var(--rust-hi);
            --qe-wrong-bg: rgba(122, 79, 42, 0.05);
            --qe-hero-bg: transparent;
            --qe-hero-text: var(--pale);
            --qe-score-color: var(--amber);
            --qe-denom-color: var(--dim);
            --qe-bd-bg: transparent;
            --qe-bd-border: var(--border);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--paper);
            font-family: 'Courier Prime', 'Courier New', monospace;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Vertical rain streaks */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(90deg,
                    transparent,
                    transparent 38px,
                    rgba(196, 191, 176, 0.018) 38px,
                    rgba(196, 191, 176, 0.018) 39px);
            pointer-events: none;
            z-index: 0;
        }

        /* Top mud stripe */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--rust), var(--amber), var(--rust));
            z-index: 10;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 700px;
            margin: 0 auto;
            padding: 64px 24px 80px;
        }

        /* Header */
        header {
            margin-bottom: 60px;
            animation: qe-fade-in 0.9s ease both;
        }

        .hun-label {
            font-size: 8px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 16px;
        }

        h1 {
            font-family: 'IM Fell English', serif;
            font-size: clamp(2.4rem, 8vw, 4rem);
            font-weight: 400;
            line-height: 1;
            color: var(--pale);
            letter-spacing: 0.02em;
            margin-bottom: 6px;
        }

        h1 em {
            color: var(--amber);
            font-style: italic;
        }

        .hu-title {
            font-family: 'IM Fell English', serif;
            font-style: italic;
            font-size: 0.9rem;
            color: var(--dim);
            margin-bottom: 18px;
        }

        .byline {
            font-size: 8px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--dim);
        }

        .rule {
            height: 1px;
            background: linear-gradient(90deg, var(--rust), transparent);
            margin: 24px 0 0;
            opacity: 0.4;
        }

        /* ── Engine overrides ── */

        /* Question card: left rust border */
        .question-card {
            border-left: 2px solid var(--rust);
        }

        /* Option letter: muted, not accent */
        .opt-letter {
            color: var(--dim);
        }

        /* Correct option: amber letter */
        .option.correct .opt-letter {
            color: var(--amber);
        }

        /* q-tag: bordered inline-block */
        .q-tag {
            color: var(--rust-hi);
            border: 1px solid rgba(122, 79, 42, 0.3);
            display: inline-block;
            padding: 3px 8px;
            font-size: 7px;
            letter-spacing: 0.45em;
        }

        /* Nav: top border */
        .nav {
            padding-top: 22px;
            border-top: 1px solid var(--border);
        }

        /* Score screen: left-border style instead of dark panel */
        .score-hero {
            background: transparent;
            padding: 0 0 0 24px;
            border-left: 2px solid var(--rust);
            text-align: left;
            margin-bottom: 44px;
        }

        .score-pre {
            font-size: 8px;
        }

        /* Verdict note: mid tone */
        .verdict-note {
            color: var(--mid);
        }
    </style>
    <link rel="stylesheet" href="../quiz-engine.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="hun-label">László Krasznahorkai · 1985 · tr. George Szirtes</div>
            <h1>Sátán<em>tangó</em></h1>
            <div class="hu-title">Шестнадцать крюков на спине дьявола</div>
            <div class="byline">A comprehension quiz · 12 questions</div>
            <div class="rule"></div>
        </header>

        <div id="quiz-root"></div>

    </div>

    <script>
        window.QUIZ = {
            config: {
                questionWord: 'Chapter',
                scorePreamble: 'Proceedings concluded · the tango is complete',
                denomText: 'correct out of 12',
            },
            questions: [
                {
                    tag: "The Opening",
                    text: "On what sound does the novel begin, the very first thing Futaki registers as he wakes in the dark?",
                    opts: [
                        "The howling of wind across the puszta",
                        "The sound of bells, distant and unexpected, though the church tower has been in ruins for years",
                        "Footsteps approaching across the mud outside his window",
                        "The voice of Irimiás calling his name"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> The novel's opening describes Futaki waking to the sound of bells, impossible bells as the nearest church has been ruined for years."
                },
                {
                    tag: "Setting",
                    text: "Where is the novel set, and what is the social/economic context of the community we meet at its outset?",
                    opts: [
                        "A Budapest apartment block during the 1956 uprising",
                        "A remote decaying agricultural collective in the Hungarian plain, whose residents are on the verge of abandoning it",
                        "A provincial Hungarian town preparing for its annual harvest festival",
                        "A border village in wartime, occupied by Soviet forces"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> The setting is a crumbling state collective farm somewhere on the flat, rain-soaked Hungarian plain."
                },
                {
                    tag: "Irimiás",
                    text: "Before Irimiás appears in the novel, what had the colonists believed about him?",
                    opts: [
                        "That he had emigrated to the West",
                        "That he had been imprisoned for theft",
                        "That he was dead",
                        "That he had become a party functionary in Budapest"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> The colonists had received word that Irimiás was dead."
                },
                {
                    tag: "Irimiás's True Role",
                    text: "What is Irimiás's actual relationship to the authorities, revealed in chapters showing him in town before he reaches the farm and elaborated on after he files his report?",
                    opts: [
                        "He is a former party member who has defected and is on the run",
                        "He is an undercover police informant who reports on the colonists to a captain",
                        "He is an architect hired to assess the farm for demolition",
                        "He is a wanted criminal using the farm as a hiding place"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Chapters set in an unnamed town show Irimiás and Petrina being summoned to meet with a police captain. Irimiás is an informant."
                },
                {
                    tag: "The Doctor",
                    text: "What does the Doctor, the obese, alcoholic physician, do throughout the novel, and what is his symbolic role?",
                    opts: [
                        "He travels between farmhouses treating the sick, the only figure who moves freely",
                        "He sits at his window drinking pálinka, watching the others through the window, and compiles a written chronicle of everything he observes",
                        "He acts as Irimiás's second-in-command, relaying his instructions to the colonists",
                        "He attempts to warn the colonists against Irimiás and is ignored"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> The Doctor is the novel's embedded witness and scribe. Sedentary, bloated, barely able to walk, he watches the world through his window and drinks while taking obsessive notes on his observations."
                },
                {
                    tag: "Estike",
                    text: "What happens to Estike, the young girl, in the chapter devoted to her?",
                    opts: [
                        "She runs away from the farm and reaches the city",
                        "She drowns trying to cross the flooded road",
                        "She kills her cat with rat poison and then, in despair, consumes the poison herself",
                        "She is taken in by Irimiás and becomes his ward"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> Estike's chapter is among the most harrowing in the novel. Tormented by her brother, isolated, and in the midst of despair, she poisons her cat and herself with rat poison then dies."
                },
                {
                    tag: "Petrina",
                    text: "What is Petrina's relationship to Irimiás, and how does he function in the narrative?",
                    opts: [
                        "He is Irimiás's brother, who frequently argues with and challenges him",
                        "He is Irimiás's long-suffering companion and sidekick; loyal, skeptical, often grumbling, but always following along anyways",
                        "He is an informant sent to spy on Irimiás by the captain",
                        "He is the only colonist who had known Irimiás was not truly dead"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> Petrina accompanies Irimiás everywhere, functioning as a kind of comic-tragic shadow. Together they form a kind of double act, the visionary and his brooding companion."
                },
                {
                    tag: "The Great Speech",
                    text: "When Irimiás addresses the assembled colonists in his long speech, what does he essentially promise them?",
                    opts: [
                        "That the collective farm will be restored to its former prosperity under new management",
                        "That he has arranged for them to emigrate legally to Austria",
                        "A new beginning, a communal project at a new location that will redeem their failed lives and give them purpose",
                        "That he will expose the party officials who allowed the farm to collapse"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> He offers the colonists a new communal life at a new place, a chance to begin again. They are desperate enough to believe him. The speech is the novel's great set-piece of charisma and self-delusion, a sermon for sheeps begging for a shepherd."
                },
                {
                    tag: "The Journey",
                    text: "Where do the colonists end up after following Irimiás away from the farm?",
                    opts: [
                        "A functioning village where they find work and housing",
                        "A derelict former estate (the Almássy manor) that proves as ruined and uninhabitable as the place they left",
                        "Budapest, where they are processed by state authorities",
                        "A working farm owned by Irimiás's relative"
                    ],
                    ans: 1,
                    exp: "<strong>Correct.</strong> The colonists follow Irimiás in the rain to the Almássy estate, and find a ruined hovel. The place is desolate. The journey that seemed like an exodus toward salvation leads back into decay. Irimiás subsequently disperses the colonists on various errands, scattering the group he assembled."
                },
                {
                    tag: "The Weather",
                    text: "The novel is famous for its treatment of one element of its environment. What weather condition pervades Sátántangó almost without interruption?",
                    opts: [
                        "Snow and bitter frost",
                        "Drought, cracked earth, and merciless sun",
                        "Incessant rain, turning everything to mud",
                        "Thick fog that never fully lifts"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> Rain falls throughout Sátántangó with barely a pause, soaking the plain, churning the mud, streaking the windows through which the Doctor watches."
                },
                {
                    tag: "Structure",
                    text: "The novel's title refers to its formal structure. How are the twelve chapters arranged in relation to the tango metaphor?",
                    opts: [
                        "Six chapters told forward, six told in reverse, moving forward then backward like the steps of a tango",
                        "Alternating chapters told from opposite perspectives, like two dancers facing each other",
                        "Twelve chapters all told from the same day, each from a different character's point of view",
                        "The chapters are numbered I-VI twice, representing the repeated steps of a round dance"
                    ],
                    ans: 0,
                    exp: "<strong>Correct.</strong> The novel is structured in twelve chapters: six steps forward, six steps back, just as the tango alternates direction."
                },
                {
                    tag: "The Bells",
                    text: "What does the Doctor experience at the old church?",
                    opts: [
                        "A 'homunculus'-like creature shows him the bells and proceeds to ring them in a manic frenzy",
                        "He discovers Irimias stealing the colonists money",
                        "Estike's dead body is wrapped in a strange fog, with children laughing in the background",
                        "The Doctor passes away after having had too much pálinka"
                    ],
                    ans: 0,
                    exp: "",
                },
                {
                    tag: "The Ending",
                    text: "How does the novel's final chapter return to its beginning, and what does the Doctor do?",
                    opts: [
                        "The Doctor leaves the farm and the novel ends with him arriving in the city",
                        "The Doctor finally reads Irimiás's full report to the captain, revealing everything",
                        "The Doctor, alone and locked in his home, begins to rewrite the first chapter with Futaki",
                        "Irimiás returns to the farm a second time; the colonists must decide again whether to follow him"
                    ],
                    ans: 2,
                    exp: "<strong>Correct.</strong> In the final chapter, the Doctor believes he has the ability to control events and begins to write down the very first moments of the story, when Futaki hears the chiming of the bells."
                }
            ],
            verdicts: [
                {
                    min: 1.0,
                    v: "The chronicle is complete.",
                    n: "You have followed Krasznahorkai's tango without a misstep. You know the mud, the rain, the bells."
                },
                {
                    min: 0.75,
                    v: "You heard the bells.",
                    n: "Lazlo's unique prose did not seem to stump you, you have a strong grasp of the novel's details."
                },
                {
                    min: 0.5,
                    v: "Somewhere in the puszta.",
                    n: "You have some feel for the rain and mud, but some details slipped by. Consider revisiting the chapters."
                },
                {
                    min: 0,
                    v: "The window is still open.",
                    n: "There is no shame in beginning again, beginning and ending are the same for the folks of Sátántangó."
                }
            ]
        };
    </script>
    <script src="../quiz-engine.js"></script>
</body>

</html>
