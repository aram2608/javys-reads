    overflow: hidden;

    content: '';

    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,.015) 10px, rgba(255,255,255,.015) 20px);

    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,.8);

    font-size: .85rem;
    margin-top: 10px;
    letter-spacing: .1em;

    font-style: italic;

    font-size: .95rem;

    padding-top: 18px;
    border-top: 1px solid rgba(212,160,23,.2);

  footer {
    background: var(--rocket);
    padding: 14px 40px;
    text-align: center;
    font-size: .75rem;
    color: rgba(245,240,232,.3);

  }

  @media (max-width: 600px) {
    .quiz-body { padding: 24px 20px; }
    header { padding: 32px 20px 24px; }

  }
</style>
</head>
