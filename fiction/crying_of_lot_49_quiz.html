<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Crying of Lot 49</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --cream: #F5F0E8;
            --ink: #1A1612;
            --faded: #7A6E62;
            --rust: #8B3A1F;
            --rust-light: #C4623E;
            --gold: #B8902A;
            --paper: #EDE7D9;
            --paper-dark: #D9D0BF;
            --correct: #2D5A27;
            --wrong: #7A1F1F;
            --correct-bg: #E8F0E6;
            --wrong-bg: #F0E6E6;
        }

        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem 5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(ellipse at 15% 20%, rgba(139, 58, 31, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 85% 80%, rgba(184, 144, 42, 0.07) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 680px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--paper-dark);
            position: relative;
        }

        .eyebrow {
            font-family: 'Courier Prime', monospace;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(28px, 6vw, 42px);
            font-weight: 700;
            line-height: 1.15;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        h1 em {
            font-style: italic;
            color: var(--rust);
        }

        .subtitle {
            font-size: 13px;
            color: var(--faded);
            letter-spacing: 0.05em;
        }

        .horn-decoration {
            display: block;
            margin: 1.25rem auto 0;
            opacity: 0.18;
            width: 48px;
        }

        /* Progress */
        .progress-track {
            height: 2px;
            background: var(--paper-dark);
            border-radius: 1px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--rust);
            border-radius: 1px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--faded);
            margin-bottom: 0.5rem;
        }

        /* Question card */
        .q-card {
            background: var(--paper);
            border: 1px solid var(--paper-dark);
            border-radius: 2px;
            padding: 2rem 2rem 1.75rem;
            margin-bottom: 1.25rem;
            position: relative;
            animation: slideIn 0.35s ease;
        }

        .q-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--rust);
            border-radius: 2px 0 0 2px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-number {
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 0.75rem;
        }

        .q-text {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            line-height: 1.5;
            color: var(--ink);
            margin-bottom: 1.75rem;
        }

        /* Options */
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .opt {
            background: var(--cream);
            border: 1px solid var(--paper-dark);
            border-radius: 2px;
            padding: 13px 16px;
            font-family: 'Courier Prime', monospace;
            font-size: 14px;
            color: var(--ink);
            text-align: left;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s, transform 0.1s;
            line-height: 1.45;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .opt-letter {
            font-size: 11px;
            font-weight: 700;
            color: var(--rust);
            letter-spacing: 0.1em;
            flex-shrink: 0;
            margin-top: 2px;
            min-width: 16px;
        }

        .opt:hover:not(:disabled) {
            border-color: var(--rust-light);
            background: #F9F4EC;
            transform: translateX(2px);
        }

        .opt:disabled {
            cursor: default;
            transform: none;
        }

        .opt.correct {
            background: var(--correct-bg);
            border-color: var(--correct);
            color: var(--correct);
        }

        .opt.correct .opt-letter {
            color: var(--correct);
        }

        .opt.wrong {
            background: var(--wrong-bg);
            border-color: var(--wrong);
            color: var(--wrong);
        }

        .opt.wrong .opt-letter {
            color: var(--wrong);
        }

        .opt.reveal {
            background: var(--correct-bg);
            border-color: var(--correct);
            color: var(--correct);
        }

        .opt.reveal .opt-letter {
            color: var(--correct);
        }

        /* Feedback */
        .feedback {
            margin-top: 1.25rem;
            padding: 14px 16px;
            background: white;
            border-left: 3px solid var(--gold);
            font-size: 13px;
            color: var(--faded);
            line-height: 1.65;
            font-style: italic;
            animation: fadeIn 0.3s ease;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Nav */
        .nav {
            display: flex;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }

        .next-btn {
            font-family: 'Courier Prime', monospace;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--rust);
            background: transparent;
            border: 1px solid var(--rust);
            border-radius: 2px;
            padding: 10px 22px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            display: none;
        }

        .next-btn:hover {
            background: var(--rust);
            color: var(--cream);
        }

        .next-btn.show {
            display: block;
        }

        /* Score screen */
        .score-screen {
            text-align: center;
            padding: 3rem 2rem;
            background: var(--paper);
            border: 1px solid var(--paper-dark);
            border-radius: 2px;
            animation: slideIn 0.4s ease;
            display: none;
        }

        .score-screen.show {
            display: block;
        }

        .score-fraction {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--ink);
            line-height: 1;
            margin-bottom: 0.25rem;
        }

        .score-fraction span {
            color: var(--rust);
        }

        .score-pct {
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--faded);
            margin-bottom: 1.75rem;
        }

        .score-divider {
            width: 48px;
            height: 1px;
            background: var(--paper-dark);
            margin: 0 auto 1.75rem;
        }

        .score-msg {
            font-family: 'Playfair Display', serif;
            font-size: 17px;
            font-style: italic;
            line-height: 1.65;
            color: var(--faded);
            max-width: 400px;
            margin: 0 auto 2rem;
        }

        .restart-btn {
            font-family: 'Courier Prime', monospace;
            font-size: 12px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--rust);
            background: transparent;
            border: 1px solid var(--rust);
            border-radius: 2px;
            padding: 11px 28px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }

        .restart-btn:hover {
            background: var(--rust);
            color: var(--cream);
        }

        /* Summary table */
        .summary {
            margin-top: 2rem;
            border-top: 1px solid var(--paper-dark);
            padding-top: 1.5rem;
            text-align: left;
        }

        .summary-title {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--faded);
            margin-bottom: 1rem;
        }

        .summary-row {
            display: flex;
            gap: 10px;
            font-size: 12px;
            padding: 8px 0;
            border-bottom: 1px solid var(--paper-dark);
            line-height: 1.4;
            align-items: flex-start;
        }

        .summary-row:last-child {
            border-bottom: none;
        }

        .s-num {
            color: var(--faded);
            flex-shrink: 0;
            width: 20px;
        }

        .s-result {
            flex-shrink: 0;
            width: 14px;
        }

        .s-q {
            color: var(--ink);
            flex: 1;
        }

        .check {
            color: var(--correct);
        }

        .cross {
            color: var(--wrong);
        }

        footer-note {
            display: block;
            text-align: center;
            font-size: 11px;
            color: var(--faded);
            margin-top: 2.5rem;
            letter-spacing: 0.08em;
        }
    </style>
</head>

<body>
    <div class="container">

        <header>
            <div class="eyebrow">Thomas Pynchon · 1966</div>
            <h1>The Crying of <em>Lot 49</em></h1>
            <svg class="horn-decoration" viewBox="0 0 48 24" fill="none" xmlns="http://www.w3.org/2000/svg"
                aria-hidden="true">
                <path d="M2 12 Q8 4 20 8 L40 6 L46 12 L40 18 L20 16 Q8 20 2 12Z" stroke="#1A1612" stroke-width="1.5"
                    fill="none" />
                <circle cx="5" cy="12" r="2" fill="#1A1612" />
                <line x1="40" y1="6" x2="46" y2="3" stroke="#1A1612" stroke-width="1.5" />
            </svg>
        </header>
        <div id="quiz-root"> </div>
    </div>

    <script>
        const LETTERS = ['A', 'B', 'C', 'D'];
        window.QUIZ = {
            questions: [
                {
                    q: "What is Oedipa Maas doing when the novel opens?",
                    opts: ["Sorting through her late husband's belongings", "Being named executor of Pierce Inverarity's estate", "Attending a Tupperware party with suburban neighbors", "Reading a letter delivered through a secret postal system"],
                    ans: 1,
                    exp: "Oedipa Maas receives word that she has been named executor of the will of Pierce Inverarity, her former lover - an act that propels her into the novel's labyrinthine mystery."
                },
                {
                    q: "What does the acronym W.A.S.T.E. stand for?",
                    opts: ["Western American Secret Transmission Exchange", "We Await Silent Tristero's Empire", "Worldwide Anarchist Society for Total Entropy", "We Are Sending Transmissions Everywhere"],
                    ans: 1,
                    exp: "'We Await Silent Tristero's Empire' is the full name of the underground mail system Oedipa believes she has uncovered - a shadow network rivaling the official postal service."
                },
                {
                    q: "What is Mucho Maas's occupation during the novel?",
                    opts: ["A used car salesman wracked with guilt", "A stamp collector and philatelist", "A radio disc jockey", "A theater director in San Narciso"],
                    ans: 2,
                    exp: "Mucho works as a radio DJ. He had previously sold used cars - a job that tormented him - and by the novel's end he has been altered by LSD given to him by Dr. Hilarius."
                },
                {
                    q: "What is the name of the Jacobean revenge play that provides Oedipa with clues about the Tristero?",
                    opts: ["'The Revenger's Tragedy' by Middleton", "'The Courier's Tragedy' by Richard Wharfinger", "'The Crying of Lot 49' by Bortz", "'The Paranoids' - a musical"],
                    ans: 1,
                    exp: "'The Courier's Tragedy,' attributed to the fictitious Jacobean playwright Richard Wharfinger, contains a subplot that Oedipa believes encodes the historical origins of the Tristero underground."
                },
                {
                    q: "What recurring symbol does Oedipa encounter associated with the Tristero?",
                    opts: ["A weeping eye dripping black ink", "A muted post horn", "A black butterfly on a burning letter", "An hourglass stamped on envelopes"],
                    ans: 1,
                    exp: "The muted post horn - a horn with its bell covered - is the emblem of W.A.S.T.E. and the Tristero. Oedipa finds it graffitied in bathroom stalls, worn as jewelry, and drawn on walls throughout her investigation."
                },
                {
                    q: "Who is Metzger, and what role does he play in the story?",
                    opts: ["A stamp dealer who identifies the Tristero's origins", "A co-executor of Inverarity's estate who becomes Oedipa's lover", "The director of the Wharfinger play Oedipa attends", "A former member of the Tristero underground"],
                    ans: 1,
                    exp: "Metzger is a lawyer - and a former child actor - assigned as co-executor of Inverarity's will alongside Oedipa. He seduces her early in the novel and helps draw her further into the estate's mysteries."
                },
                {
                    q: "What is the Nefastis Machine purported to accomplish?",
                    opts: ["Decode intercepted messages from the Tristero network", "Harness Maxwell's Demon to produce work from information", "Sort stamps by their cancellation marks and routes", "Broadcast pirate radio signals bypassing federal oversight"],
                    ans: 1,
                    exp: "John Nefastis claims his machine can use a 'Demon' - referencing physicist James Clerk Maxwell's thought experiment - to convert information into thermodynamic work, requiring a 'sensitive' person to communicate with it mentally."
                },
                {
                    q: "Which of the following is NOT one of Oedipa's four possible explanations for everything she has experienced?",
                    opts: ["The Tristero conspiracy is genuinely real", "Inverarity engineered the whole thing as a posthumous joke", "She has been hallucinating or projecting meaning onto coincidence", "A government agency is using her to expose the Tristero"],
                    ans: 3,
                    exp: "Oedipa distills her situation into four possibilities: the Tristero is real; she is mentally ill; Inverarity staged it all as an elaborate prank; or she has unconsciously imposed patterns onto random events. A government conspiracy is not among them."
                },
                {
                    q: "What is the significance of the Thurn und Taxis postal system in the novel?",
                    opts: ["It is Pynchon's name for the American postal service Inverarity owned", "It is the official European mail monopoly that the Tristero allegedly opposed for centuries", "It is the cover name the Tristero used while operating in San Narciso", "It is a fictional postal system invented by the character Genghis Cohen"],
                    ans: 1,
                    exp: "Thurn und Taxis was a real historical European postal monopoly. In the novel, the Tristero is said to have been a rival underground system persecuted by Thurn und Taxis - a history Oedipa pieces together through the Wharfinger play and academic sources."
                },
                {
                    q: "Why does the novel end at the auction of Lot 49?",
                    opts: ["Oedipa is arrested before the auction can begin", "The novel ends just as the lot is about to be called, withholding the revelation", "The stamps are revealed to be forgeries, collapsing the mystery", "Metzger outbids the mysterious figure, ending the conspiracy"],
                    ans: 1,
                    exp: "Pynchon ends the novel at the moment of potential revelation - Oedipa waits for Lot 49 (a collection of stamps linked to the Tristero) to be cried at auction, hoping the bidder will confirm the conspiracy. The novel ends before we learn the answer, leaving ambiguity intact."
                }
            ],
            verdicts: [
                {
                    min: 1.0,
                    v: "Perfect score!",
                    n: "You untangled Trystero's secret to its supposed end.",
                },
                {
                    min: 0.75,
                    v: "Pynchon's puns were not lost on you.",
                    n: "You only stubbed your toe in the maze once or twice.",
                },
                {
                    min: 0.5,
                    v: "Did you get into the Mucho's LSD?",
                    n: "Was the meaning real or did you want it to be? Have a re-read and make your choice.",
                },
                {
                    min: 0.0,
                    v: "Lost in the WASTE.",
                    n: "Trystero seems to have eluded you. A second investigation is needed.",
                },
            ],
        };
    </script>

    <script src="../quiz-engine.js"></script>
</body>

</html>
