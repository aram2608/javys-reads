<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Trial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Vollkorn:ital,wght@0,400;0,600;1,400&display=swap');

        :root {
            /* palette */
            --bg: #0d0f0e;
            --fog: #b8c4b4;
            --pale: #d8e4d2;
            --dim: #576457;
            --mute: #343c35;
            --file: #3d6050;
            --file-hi: #4e7a62;
            --stamp: #8b2222;
            --border: rgba(155, 180, 160, 0.12);
            --border-hi: rgba(155, 180, 160, 0.28);

            /* engine vars */
            --qe-font-serif: 'Vollkorn', serif;
            --qe-font-body: 'Special Elite', monospace;
            --qe-font-label: 'Special Elite', monospace;
            --qe-surface: rgba(155, 180, 160, 0.025);
            --qe-border: var(--border);
            --qe-border-hi: var(--border-hi);
            --qe-text: var(--pale);
            --qe-text-muted: var(--dim);
            --qe-accent: var(--file);
            --qe-accent-lo: rgba(61, 96, 80, 0.07);
            --qe-btn-bg: var(--file);
            --qe-btn-text: var(--pale);
            --qe-btn-hover-bg: var(--file-hi);
            --qe-btn-hover-text: var(--pale);
            --qe-correct: #92c0a0;
            --qe-correct-bg: rgba(61, 96, 80, 0.07);
            --qe-wrong: #bb7070;
            --qe-wrong-bg: rgba(139, 34, 34, 0.05);
            --qe-hero-bg: transparent;
            --qe-hero-text: var(--pale);
            --qe-score-color: var(--pale);
            --qe-denom-color: var(--dim);
            --qe-bd-bg: var(--qe-surface);
            --qe-bd-border: var(--border);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--fog);
            font-family: 'Special Elite', 'Courier New', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Bureaucratic dot-grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(130, 160, 140, 0.14) 1px, transparent 1px);
            background-size: 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        /* Faint left-margin rule, like a legal pad */
        body::after {
            content: '';
            position: fixed;
            left: max(24px, calc(50% - 390px));
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(139, 34, 34, 0.07);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 720px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        /* Header */
        header {
            margin-bottom: 60px;
            padding-left: 24px;
            border-left: 2px solid var(--file);
            animation: qe-slide-up 0.7s ease both;
        }

        .case-ref {
            font-size: 8px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 14px;
        }

        h1 {
            font-family: 'Special Elite', monospace;
            font-size: clamp(2.6rem, 9vw, 4.2rem);
            color: var(--pale);
            line-height: 1;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }

        .title-de {
            font-family: 'Vollkorn', serif;
            font-style: italic;
            font-size: 1rem;
            color: var(--dim);
        }

        /* ── Engine overrides ── */

        /* Question card: left file border */
        .question-card {
            border-left: 2px solid var(--file);
        }

        /* q-tag → styled as .q-exhibit */
        .q-tag {
            color: var(--file-hi);
            border: 1px solid rgba(61, 96, 80, 0.35);
            display: inline-block;
            padding: 3px 8px;
            font-size: 7px;
            letter-spacing: 0.5em;
        }

        /* Diff badges */
        .diff-badge {
            font-size: 7px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            padding: 3px 7px;
            border: 1px solid;
        }

        .diff-easy   { color: #70b070; border-color: rgba(100, 180, 100, 0.3); }
        .diff-medium { color: #c0a060; border-color: rgba(200, 160, 80, 0.3); }
        .diff-hard   { color: #b85858; border-color: rgba(180, 80, 80, 0.3); }

        /* Option letter: muted */
        .opt-letter {
            color: var(--dim);
        }

        /* Correct option letter: institutional green */
        .option.correct .opt-letter {
            color: #92c0a0;
        }

        /* Explanation: Vollkorn serif */
        .explanation {
            font-family: 'Vollkorn', serif;
        }

        /* Score screen: left-border style instead of dark panel */
        .score-hero {
            background: transparent;
            padding: 0 0 0 24px;
            border-left: 2px solid var(--file);
            text-align: left;
            margin-bottom: 48px;
        }

        /* Verdict: italic institutional green */
        .verdict {
            color: var(--file-hi);
            font-style: italic;
        }

        /* Verdict note: Vollkorn, muted */
        .verdict-note {
            font-family: 'Vollkorn', serif;
            color: rgba(184, 196, 180, 0.7);
            margin-top: 10px;
        }

        /* Breakdown: extra top margin */
        .breakdown {
            margin-top: 40px;
        }

        @media (max-width: 580px) {
            header { padding-left: 16px; }
        }
    </style>
    <link rel="stylesheet" href="../quiz-engine.css">
</head>

<body>

    <div class="container">

        <header>
            <div class="case-ref">Franz Kafka · Unfinished 1914–15 · Published Posthumously 1925</div>
            <h1>The Trial</h1>
            <div class="title-de">Der Proceß</div>
        </header>

        <div id="quiz-root"></div>

    </div>

    <script>
        window.QUIZ = {
            questions: [
                {
                    q: "How does the novel begin?",
                    opts: [
                        "Josef K. receives a letter summoning him to court",
                        "Josef K. is arrested on the morning of his thirtieth birthday without explanation",
                        "Josef K. wakes up to find strangers in his apartment who inform him he is being watched",
                        "Josef K. is fired from his job at the bank"
                    ],
                    ans: 1,
                    diff: "easy",
                    fb: "The novel opens famously: 'Someone must have slandered Josef K., for one morning, without having done anything wrong, he was arrested.' The arrest happens in his boarding house on his 30th birthday, with no charge explained."
                },
                {
                    q: "What is Josef K.'s profession?",
                    opts: [
                        "Lawyer",
                        "Schoolteacher",
                        "Bank clerk - a senior official at a bank",
                        "Government bureaucrat"
                    ],
                    ans: 2,
                    diff: "easy",
                    fb: "K. is a senior bank official (Prokurist). His respectable professional life contrasts sharply with his incomprehensible entanglement with the court."
                },
                {
                    q: "Although K. is 'arrested,' what strange aspect defines his situation throughout the novel?",
                    opts: [
                        "He is kept in a cell at all times",
                        "He is free to continue his normal life and work while the proceedings against him go on",
                        "He is forced to wear a mark identifying him as an accused",
                        "He must report to the court every morning"
                    ],
                    ans: 1,
                    diff: "medium",
                    fb: "K.'s arrest is paradoxical - he is never imprisoned. He continues working at the bank and going about his life. The court operates invisibly, burdening him psychologically without physically confining him."
                },
                {
                    q: "Where is K.'s first court hearing held?",
                    opts: [
                        "In a grand government building in the city center",
                        "In a cramped, stuffy room in a tenement building in a poor part of the city",
                        "In the basement of the bank where he works",
                        "In his own boarding house"
                    ],
                    ans: 1,
                    diff: "medium",
                    fb: "The court is located in a rundown tenement building, in a district K. is unfamiliar with. The hearing room is small, crowded, and suffocating - an ironic setting for a powerful judicial process."
                },
                {
                    q: "What is the role of the painter Titorelli in the novel?",
                    opts: [
                        "He is K.'s closest friend who helps him escape",
                        "He is an official court artist who explains the court's workings and offers three types of possible 'acquittal'",
                        "He paints a portrait of K. that is used as evidence against him",
                        "He is a witness to K.'s alleged crime"
                    ],
                    ans: 1,
                    diff: "medium",
                    fb: "Titorelli paints portraits of judges and is familiar with the court's inner workings. He describes three forms of acquittal: definite acquittal (essentially impossible), ostensible acquittal (temporary, case can be reopened), and indefinite postponement. None are reassuring."
                },
                {
                    q: "What is the significance of the 'whipper' scene K. discovers in a storage room at the bank?",
                    opts: [
                        "It reveals that K. is secretly employed by the court to punish others",
                        "Two guards who arrested K. are being flogged as punishment for complaints K. made against them, illustrating the court's brutal internal discipline",
                        "K. is flogged himself as a warning to drop his case",
                        "It shows that K.'s colleagues are conspiring against him"
                    ],
                    ans: 1,
                    diff: "hard",
                    fb: "K. discovers Franz and Willem (his original warders) being whipped in a bank storeroom. He had complained about them to the court. This scene demonstrates the court's cruel internal logic and implicates K.'s own actions in others' suffering - a source of guilt that K. tries to ignore by pretending it didn't happen."
                },
                {
                    q: "What is K.'s uncle's reaction when he learns about the trial?",
                    opts: [
                        "He is calm and indifferent",
                        "He is alarmed and insists K. take the proceedings seriously, arranging for K. to meet the lawyer Huld",
                        "He bribes the court officials to have the case dismissed",
                        "He disowns K. out of shame"
                    ],
                    ans: 1,
                    diff: "medium",
                    fb: "K.'s uncle Karl comes to the city in a panic. He considers the trial a major disgrace that could harm the family name and drags K. off to visit the lawyer Huld, who turns out to be of dubious effectiveness."
                },
                {
                    q: "What does the parable 'Before the Law' (told by the priest) suggest?",
                    opts: [
                        "The Law is fundamentally just, but humans are too flawed to reach it",
                        "A man waits his entire life for admission to the Law, which is guarded by a doorkeeper; the door was meant only for him but he never enters",
                        "The Law can be bribed, and the man simply did not pay enough",
                        "The Law does not exist - the doorkeeper was deceiving the man"
                    ],
                    ans: 1,
                    diff: "hard",
                    fb: "'Before the Law' is the novel's philosophical core. A man from the country seeks entry to the Law but is perpetually deferred by a doorkeeper. He spends his whole life waiting and dies without entering. The priest and K. debate whether the doorkeeper deceived the man or not - the parable resists a single interpretation, suggesting the Law's inaccessibility is built into its nature."
                },
                {
                    q: "How does the novel end?",
                    opts: [
                        "K. is acquitted at a dramatic final trial",
                        "K. is executed by two men who stab him in the heart - he dies 'like a dog'",
                        "K. escapes and flees the country",
                        "K. discovers he was never really accused of anything and the whole trial was a misunderstanding"
                    ],
                    ans: 1,
                    diff: "easy",
                    fb: "On the eve of his thirty-first birthday - exactly one year after his arrest - two men in frock coats take K. to a quarry and stab him. K.'s last words reflect his own shame and capitulation: he dies feeling like the 'shame of it' will outlive him. He never learns the charge, and justice never arrives."
                },
                {
                    q: "Which of the following best captures the novel's central thematic concern?",
                    opts: [
                        "A detective mystery about uncovering a real crime",
                        "The dehumanizing nature of modern bureaucracy and the impossibility of achieving justice or even understanding one's own guilt within an opaque, all-powerful system",
                        "A political allegory specifically about Nazi Germany",
                        "A realist critique of the Austrian legal system of Kafka's time"
                    ],
                    ans: 1,
                    diff: "hard",
                    fb: "The Trial is an existential and philosophical novel. The court represents an incomprehensible, self-validating system of power and guilt that cannot be questioned from within. K.'s struggle is not about a specific crime but about humanity's relationship to authority, guilt, and meaning. Kafka wrote it in 1914–15; it was published posthumously in 1925."
                }
            ],
            verdicts: [
                {
                    min: 1.0,
                    v: "Case dismissed.",
                    n: "You made it out of The Trial alive."
                },
                {
                    min: 0.75,
                    v: "Charges reduced.",
                    n: "A strong mastery over the text. Some chapters may be worth a revisit."
                },
                {
                    min: 0.5,
                    v: "Proceedings continue.",
                    n: "Decent grasp of the major events. A re-read is in order."
                },
                {
                    min: 0.0,
                    v: "Like a dog!",
                    n: "Sometimes giving up is a better choice."
                }
            ]
        };
    </script>

    <script src="../quiz-engine.js"></script>
</body>

</html>
