<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Leveler</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../quiz-engine.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --ink: #1a1510;
            --parchment: #f5f0e8;
            --aged: #e8e0cc;
            --rust: #8b3a2a;
            --gold: #c9952a;
            --muted: #6b5f4e;
            --correct: #2d6a4f;
            --wrong: #8b2a2a;
            --correct-bg: #e8f5ee;
            --wrong-bg: #f5e8e8;

            --qe-font-serif: 'Playfair Display', Georgia, serif;
            --qe-font-body: 'Source Serif 4', Georgia, serif;
            --qe-font-label: 'Source Serif 4', Georgia, serif;
            --qe-surface: #ffffff;
            --qe-border: var(--aged);
            --qe-border-hi: var(--rust);
            --qe-text: var(--ink);
            --qe-text-muted: var(--muted);
            --qe-accent: var(--gold);
            --qe-accent-lo: rgba(201, 149, 42, 0.06);
            --qe-btn-bg: var(--rust);
            --qe-btn-text: #ffffff;
            --qe-btn-hover-bg: #6e2e20;
            --qe-btn-hover-text: #ffffff;
            --qe-correct: var(--correct);
            --qe-correct-bg: var(--correct-bg);
            --qe-wrong: var(--wrong);
            --qe-wrong-bg: var(--wrong-bg);
            --qe-hero-bg: var(--ink);
            --qe-hero-text: var(--parchment);
            --qe-score-color: var(--gold);
            --qe-denom-color: rgba(245, 240, 232, 0.6);
            --qe-bd-bg: #ffffff;
            --qe-bd-border: var(--aged);
        }

        body {
            background: var(--parchment);
            color: var(--ink);
            font-family: 'Source Serif 4', Georgia, serif;
            min-height: 100vh;
            padding: 2rem 1rem 4rem;
            background-image:
                radial-gradient(ellipse at 20% 10%, rgba(201, 149, 42, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 90%, rgba(139, 58, 42, 0.06) 0%, transparent 60%);
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 2.5rem 0 2rem;
            border-bottom: 1px solid var(--aged);
            margin-bottom: 2.5rem;
            position: relative;
        }

        .eyebrow {
            font-size: 0.72rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--rust);
            margin-bottom: 0.8rem;
            font-weight: 600;
        }

        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 700;
            line-height: 1.15;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        h1 em {
            color: var(--rust);
            font-style: italic;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--muted);
            font-style: italic;
        }

        .ornament {
            display: block;
            text-align: center;
            color: var(--gold);
            font-size: 1.2rem;
            margin: 1rem 0 0;
            letter-spacing: 0.5em;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <p class="eyebrow">Comprehension Quiz</p>
            <h1><em>The Great Leveler</em></h1>
            <p class="subtitle">Violence and the History of Inequality - Walter Scheidel</p>
            <span class="ornament">- ✦ -</span>
        </header>

        <div id="quiz-root"></div>
    </div>

    <script>
        window.QUIZ = {
            questions: [
                {
                    q: "What is Scheidel's central thesis in The Great Leveler?",
                    opts: [
                        "Economic growth naturally reduces inequality over time.",
                        "Only government redistribution policies can effectively reduce inequality.",
                        "Throughout history, large-scale reductions in inequality have required violent, catastrophic \"Four Horsemen\" events.",
                        "Inequality is primarily driven by technological change rather than political structures."
                    ],
                    ans: 2,
                    exp: "Scheidel's core argument is that peaceful, durable reductions in inequality are historically rare. The \"Four Horsemen\" - mass mobilization warfare, transformative revolution, state collapse, and lethal pandemics - are the primary mechanisms that have leveled wealth and income distributions."
                },
                {
                    q: "Which of the following does Scheidel NOT identify as one of his \"Four Horsemen\" of leveling?",
                    opts: [
                        "Mass mobilization warfare",
                        "Transformative revolution",
                        "Democratic reform movements",
                        "State collapse and systems disruption"
                    ],
                    ans: 2,
                    exp: "The Four Horsemen are: mass mobilization warfare, transformative revolution, state collapse, and lethal pandemics. Democratic reform and peaceful redistribution are notably absent - a key point of Scheidel's argument about the limits of gradualist approaches."
                },
                {
                    q: "How does Scheidel characterize the compression of inequality that occurred after World War II in many Western nations?",
                    opts: [
                        "As the result of progressive taxation and labor union strength alone.",
                        "As a rare outcome driven primarily by total war mobilization and its fiscal demands, not sustainable policy.",
                        "As evidence that market economies naturally self-correct toward equality.",
                        "As the product of Marshall Plan foreign aid redistributing wealth internationally."
                    ],
                    ans: 1,
                    exp: "Scheidel argues that the mid-20th-century compression was largely a product of total war - mass mobilization destroyed capital, compressed wages, and demanded progressive taxation. He is skeptical that the policy environment alone could have produced or can reproduce this leveling."
                },
                {
                    q: "What does Scheidel's analysis of ancient Rome and other pre-modern empires primarily illustrate?",
                    opts: [
                        "That inequality was lower in ancient societies because of communal land ownership.",
                        "That extreme wealth concentration is an ancient pattern, not a modern invention.",
                        "That Roman fiscal policy was a model of progressive redistribution.",
                        "That pre-modern states lacked the capability to measure inequality."
                    ],
                    ans: 1,
                    exp: "Using proxies like skeletal health data, wealth distributions in Roman Egypt, and literary evidence, Scheidel shows that extreme inequality - comparable to modern levels - existed in ancient empires. High inequality is the historical norm, not an anomaly of capitalism."
                },
                {
                    q: "How does Scheidel treat the Black Death in his argument about leveling mechanisms?",
                    opts: [
                        "As irrelevant, since it affected rich and poor equally.",
                        "As a case of pandemic-driven leveling: labor scarcity drove up wages and eroded elite land wealth.",
                        "As proof that environmental shocks increase inequality by disrupting peasant agriculture.",
                        "As an outlier that contradicts his general thesis."
                    ],
                    ans: 1,
                    exp: "The Black Death is one of Scheidel's key historical cases. By killing roughly a third of Europe's population, it created acute labor scarcity, which gave surviving peasants bargaining power and drove up real wages, one of the clearest examples of pandemic-driven leveling in the historical record."
                },
                {
                    q: "What is Scheidel's view on the potential for peaceful, reform-driven reductions of inequality in modern democracies?",
                    opts: [
                        "He is optimistic that technological progress will enable unprecedented redistribution.",
                        "He believes strong international institutions can replace the need for violent leveling.",
                        "He is deeply skeptical, arguing historical evidence offers little precedent for durable peaceful leveling.",
                        "He argues that proportional representation electoral systems reliably produce sustained redistribution."
                    ],
                    ans: 2,
                    exp: "This is among the book's most sobering conclusions. Scheidel reviews efforts at reform and finds them modest and reversible. Without a catastrophic shock, entrenched elites tend to successfully resist structural redistribution, a pessimistic verdict on the limits of democratic gradualism."
                },
                {
                    q: "Which of the following best describes Scheidel's use of \"inequality\" throughout the book?",
                    opts: [
                        "He focuses exclusively on income inequality as measured by the Gini coefficient.",
                        "He examines both wealth and income inequality across a wide range of societies using diverse historical evidence.",
                        "He defines inequality solely in terms of land ownership patterns.",
                        "He restricts his analysis to societies with written tax records."
                    ],
                    ans: 1,
                    exp: "Scheidel is methodologically broad: he uses Gini coefficients where available but also draws on skeletal anthropometry, archaeological evidence, literary sources, and papyri. His goal is a long-run comparative history of both wealth and income inequality."
                },
                {
                    q: "How does Scheidel's treatment of communist revolutions fit into his framework?",
                    opts: [
                        "He argues they failed to reduce inequality because they were peaceful.",
                        "He treats them as examples of transformative revolution - violent leveling that reduced inequality, though often at enormous human cost.",
                        "He excludes them as ideologically driven outliers irrelevant to economic analysis.",
                        "He shows they increased inequality by concentrating power in a new elite."
                    ],
                    ans: 1,
                    exp: "Communist revolutions, in Russia, China, and elsewhere, are Scheidel's examples of the \"transformative revolution\" horseman. They dramatically compressed wealth distributions, but the leveling came through expropriation, mass violence, and terror. The cost was catastrophic, illustrating his broader point that leveling historically requires upheaval."
                },
                {
                    q: "What does Scheidel suggest about the relationship between state capacity and inequality?",
                    opts: [
                        "Strong states always reduce inequality through superior fiscal capacity.",
                        "State collapse tends to increase inequality by allowing elites to consolidate power.",
                        "State collapse and systems disruption can level inequality by destroying elite wealth and power structures.",
                        "State capacity is irrelevant to long-run inequality trends."
                    ],
                    ans: 2,
                    exp: "State collapse is one of the Four Horsemen precisely because it can destroy the institutions and property structures that underpin elite wealth. When states disintegrate, the existing hierarchy of wealth often collapses with them, a brutal but historically recurrent form of leveling."
                },
                {
                    q: "What is the broader implication Scheidel draws about the future of inequality in stable, peaceful societies?",
                    opts: [
                        "Automation will eventually flatten wealth distributions without political intervention.",
                        "Climate change will function as a new leveling force comparable to the Black Death.",
                        "Without a catastrophic shock, there is little historical basis to expect meaningful reductions in inequality.",
                        "Global financial regulation is likely to produce a new era of Kuznets-curve convergence."
                    ],
                    ans: 2,
                    exp: "Scheidel ends on a deliberately uncomfortable note: the historical record suggests that absent catastrophic violence, pandemic, or collapse, inequality tends to persist or worsen. For those who hope to reduce inequality through peaceful means, he offers no easy comfort, only a frank account of what the evidence shows."
                }
            ],
            verdicts: [
                {min: 1.0, v: "Master of catastrophe.", n: "An exceptional reading. You have absored Scheidel's core message well."},
                {min: 0.75, v: "Proficient in leveling.", n: "A solid grasp of the core thesis. A few details could use a revisit."},
                {min: 0.5, v: "A ways to go.", n: "You have a general idea, but some nuance seems to have slipped by."},
                {min: 0, v: "A leveling of comprehension.", n: "The Four Horsemen seem to have destroyed your reading comprehension as well."},
            ],
        };
    </script>
    <script src="../quiz-engine.js"></script>
</body>

</html>
