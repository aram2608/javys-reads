    <title>King Dollar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&display=swap');:root {--qe-font-serif:       'Newsreader', Georgia, serif;--qe-font-body:        'Newsreader', Georgia, serif;--qe-font-label:       'IBM Plex Mono', monospace;--qe-surface:          rgba(180,220,195,0.03);--qe-border:           rgba(180,220,195,0.09);--qe-border-hi:        rgba(74,164,114,0.40);--qe-text:             #c2d4c8;--qe-text-muted:       #5a7a65;--qe-accent:           #4aa472;--qe-accent-lo:        rgba(74,164,114,0.07);--qe-btn-bg:           rgba(74,164,114,0.07);--qe-btn-text:         #c2d4c8;--qe-btn-hover-bg:     rgba(74,164,114,0.16);--qe-btn-hover-text:   #ddeee5;--qe-correct:          #7ab88a;--qe-correct-bg:       rgba(122,184,138,0.09);--qe-wrong:            #b8735a;--qe-wrong-bg:         rgba(184,115,90,0.09);--qe-hero-bg:          transparent;--qe-hero-text:        #c2d4c8;--qe-score-color:      #4aa472;--qe-denom-color:      #5a7a65;--qe-bd-bg:            rgba(180,220,195,0.015);--qe-bd-border:        rgba(180,220,195,0.05);}* { margin: 0; padding: 0; box-sizing: border-box; }html { scroll-behavior: smooth; }body {background-color: #060e09;background-image:radial-gradient(ellipse at 15% 0%, rgba(74,164,114,0.05) 0%, transparent 55%),radial-gradient(ellipse at 85% 100%, rgba(40,100,65,0.04) 0%, transparent 55%),repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(180,220,195,0.022) 27px, rgba(180,220,195,0.022) 28px);color: #c2d4c8;font-family: 'Newsreader', Georgia, serif;font-size: 1.15rem;line-height: 1.58;min-height: 100vh;position: relative;}body::before {content: '';position: fixed;inset: 0;background-image:radial-gradient(circle at 1px 1px, rgba(180,220,195,0.035) 1px, transparent 1px);background-size: 4px 4px;pointer-events: none;opacity: 0.4;z-index: 0;}.container { max-width: 720px; margin: 0 auto; padding: 72px 28px 96px; position: rela </head>
<body>
    <div class="container">
        <header>
            <h1>King Dollar</h1>
            <div class="subtitle">Paul Blustein</div>
        </header>
        <div id="quiz-root"></div>
    </div>

    <script>
        window.QUIZ = {
            questions: [
    {
        "text": "What 1944 agreement established the U.S. dollar as the anchor of the international monetary system?",
        "opts": [
            "The GATT treaty",
            "The Bretton Woods Conference",
            "The Plaza Accord",
            "The Smithsonian Agreement"
        ],
        "ans": 1,
        "exp": "The Bretton Woods Conference tied the dollar to gold at $35 per ounce and made all other currencies pegged to the dollar, positioning the U.S. at the center of postwar finance."
    },
    {
        "text": "Why did President Nixon end the dollar's convertibility to gold in 1971?",
        "opts": [
            "To fund the Vietnam War directly",
            "To punish European trade partners",
            "The U.S. lacked enough gold to cover its overseas dollar liabilities",
            "Congress passed legislation requiring it"
        ],
        "ans": 2,
        "exp": "By 1971 the U.S. held far fewer gold reserves than the dollar claims held abroad. Closing the gold window prevented a run on Fort Knox."
    },
    {
        "text": "Treasury Secretary John Connally's remark to G10 counterparts after the 1971 Nixon Shock was:",
        "opts": [
            "Gold is finished as a monetary instrument",
            "The dollar must float or fail",
            "The dollar is our currency but it's your problem",
            "America will never devalue its currency"
        ],
        "ans": 2,
        "exp": "Connally's blunt statement captured the asymmetry of dollar dominance. The U.S. sets policy for domestic reasons; the rest of the world absorbs the consequences."
    },
    {
        "text": "Approximately what share of global gold reserves did the United States hold at the time of the Bretton Woods conference?",
        "opts": [
            "30%",
            "50%",
            "65%",
            "80%"
        ],
        "ans": 3,
        "exp": "Holding roughly 80% of world gold stocks gave the dollar unrivaled credibility as the postwar anchor currency. That commanding position eroded over the following decades."
    },
    {
        "text": "Paul Volcker's aggressive interest rate increases in the early 1980s are described in the book as establishing which pillar of dollar dominance?",
        "opts": [
            "Treasury market liquidity",
            "Central bank independence",
            "Open capital accounts",
            "Petrodollar recycling"
        ],
        "ans": 1,
        "exp": "By accepting deep recession to kill inflation, Volcker proved the Fed would defend price stability at real cost. That institutional credibility became foundational to global trust in the dollar."
    },
    {
        "text": "What percentage of global foreign exchange reserves is denominated in dollars according to the book?",
        "opts": [
            "71%",
            "64%",
            "59%",
            "45%"
        ],
        "ans": 2,
        "exp": "The dollar's reserve share declined from over 70% in 2000 to roughly 59%, but it still dwarfs every other reserve currency by a large margin."
    },
    {
        "text": "What share of all foreign exchange transactions involves the dollar?",
        "opts": [
            "62%",
            "75%",
            "88%",
            "95%"
        ],
        "ans": 2,
        "exp": "Because most forex deals are intermediated through the dollar, the greenback anchors global trade and finance even in transactions that do not directly involve the United States."
    },
    {
        "text": "In the 1970s Saudi Arabia recycled its oil revenues primarily into which asset?",
        "opts": [
            "Gold bullion",
            "U.S. Treasury bonds",
            "IMF special drawing rights",
            "European sovereign debt"
        ],
        "ans": 1,
        "exp": "The Treasury market's unmatched depth and liquidity made it the only place Saudi Arabia could invest billions without moving prices against itself. No other market offered comparable scale."
    },
    {
        "text": "What action did the Federal Reserve take on March 15, 2020 in response to the COVID-19 crisis?",
        "opts": [
            "Raised rates to curb expected inflation",
            "Cut rates to zero and began large-scale asset purchases",
            "Suspended dollar swap lines with foreign central banks",
            "Pegged the dollar to a basket of currencies"
        ],
        "ans": 1,
        "exp": "The Fed cut the federal funds rate to zero and purchased roughly two trillion dollars in Treasuries within two months, acting as dealer of last resort in seized markets."
    },
    {
        "text": "The primary reason the euro cannot replace the dollar as a global reserve currency is that the eurozone:",
        "opts": [
            "Is too small economically to matter at scale",
            "Invoices most of its own trade in dollars",
            "Lacks a single unified safe asset comparable to U.S. Treasuries",
            "Has a central bank that lacks political independence"
        ],
        "ans": 2,
        "exp": "German bunds and Greek bonds carry different sovereign risk. Without one deep pool of safe assets, foreign central banks cannot accumulate euros at the scale required for reserve purposes."
    },
    {
        "text": "What structural obstacle prevents the Chinese renminbi from becoming a dominant reserve currency?",
        "opts": [
            "China's economy is too small",
            "Capital controls limit international use of the currency",
            "The renminbi is pegged too rigidly to the dollar",
            "China lacks a functioning bond market"
        ],
        "ans": 1,
        "exp": "Reserve currencies require capital to flow in and out freely. China's capital controls make the renminbi unsuitable for large-scale reserve accumulation by foreign central banks."
    },
    {
        "text": "The CHIPS system, which handles more than 90% of large-value cross-border dollar transactions, is located in:",
        "opts": [
            "Washington D.C.",
            "Chicago",
            "San Francisco",
            "Midtown Manhattan"
        ],
        "ans": 3,
        "exp": "The Clearing House Interbank Payments System routes the vast majority of international dollar settlements through a single node in New York, concentrating dollar clearing in one city."
    },
    {
        "text": "Economist Helene Rey's \"global financial cycle\" concept describes how:",
        "opts": [
            "The dollar's value moves in long cycles tied to commodity prices",
            "Fed policy creates capital flows that destabilize other countries regardless of their own choices",
            "Reserve currency status rotates among great powers over historical cycles",
            "Global interest rates converge toward a single equilibrium over time"
        ],
        "ans": 1,
        "exp": "When the Fed tightens or eases, capital surges into or out of emerging markets worldwide, leaving those countries with little effective monetary autonomy of their own."
    },
    {
        "text": "According to the book the daily trading volume in the U.S. Treasury market grew from about $30 billion in the mid-1970s to roughly how much by the time of writing?",
        "opts": [
            "$150 billion",
            "$300 billion",
            "$450 billion",
            "$600 billion"
        ],
        "ans": 3,
        "exp": "The Treasury market's growth in depth and liquidity is central to why the dollar remains dominant. No rival sovereign bond market approaches this scale of daily turnover."
    },
    {
        "text": "The Federal Reserve Act that created the institution underpinning dollar dominance was passed in:",
        "opts": [
            "1900",
            "1907",
            "1913",
            "1920"
        ],
        "ans": 2,
        "exp": "The 1913 Federal Reserve Act established the central bank that would eventually anchor U.S. monetary credibility and support the dollar's global role through the twentieth century."
    },
    {
        "text": "Blustein warns that overusing the dollar as a financial weapon through sanctions risks:",
        "opts": [
            "Triggering a revival of the gold standard",
            "Encouraging rival payment systems that bypass the dollar",
            "Forcing the IMF to issue a competing reserve asset",
            "Weakening the Fed's domestic mandate"
        ],
        "ans": 1,
        "exp": "When secondary sanctions forced European companies out of Iran, it signaled to many governments that dollar access could be cut off arbitrarily, giving them incentive to build alternatives."
    },
    {
        "text": "What does Blustein identify as the primary condition that could unseat the dollar?",
        "opts": [
            "China surpassing the U.S. in total GDP",
            "Completion of a European fiscal union",
            "Catastrophic missteps by the U.S. government",
            "A new multilateral gold standard agreement"
        ],
        "ans": 2,
        "exp": "The dollar's structural advantages are deep enough that only self-inflicted damage to U.S. institutions, rule of law, or Federal Reserve independence could plausibly end its dominance."
    },
    {
        "text": "The \"Flexible Average Inflation Targeting\" framework introduced by Fed Chair Jerome Powell in August 2020 prioritizes:",
        "opts": [
            "Preemptively raising rates before inflation appears",
            "Employment over preemptive inflation prevention",
            "A strict 2% inflation ceiling at all times",
            "Dollar depreciation as a tool for export competitiveness"
        ],
        "ans": 1,
        "exp": "FAIT allows inflation to run above 2% temporarily in order to achieve maximum employment, a significant departure from the more hawkish doctrine that defined the Fed in earlier decades."
    },
    {
        "text": "Barry Eichengreen's book \"Exorbitant Privilege,\" referenced by Blustein, describes the advantage of:",
        "opts": [
            "Issuing the world's reserve currency and borrowing cheaply in your own money",
            "Controlling the largest share of global gold supply",
            "Setting global interest rates without international coordination",
            "Running sustained trade surpluses to accumulate foreign claims"
        ],
        "ans": 0,
        "exp": "The phrase was coined by French officials to describe how the U.S. borrows internationally at low cost because the world needs dollars for trade settlement and reserve holdings."
    },
    {
        "text": "Dollar-pegged stablecoins are viewed in the book as potentially:",
        "opts": [
            "Replacing the dollar in international trade within a decade",
            "Reinforcing dollar dominance by embedding it in digital finance",
            "Enabling China to circumvent U.S. financial sanctions",
            "Undermining the liquidity of the Treasury market"
        ],
        "ans": 1,
        "exp": "Rather than challenging the greenback, dollar-pegged stablecoins extend its reach into new digital payment systems, deepening global dependence on the dollar rather than reducing it."
    }
],
            verdicts: [
                { min: 0.8, v: "Excellent",  n: "Outstanding recall." },
                { min: 0.6, v: "Good",       n: "Solid understanding." },
                { min: 0.4, v: "Fair",       n: "Worth revisiting." },
                { min: 0.0, v: "Try again",  n: "Time for a reread." }
            ]
        };
    </script>
    <script src="../quiz-engine.js"></script>
</body>
