<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goliath's Curse</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@400;600&family=Crimson+Pro&family=Courier+Prime&display=swap');:root {--qe-font-serif:       'Spectral', Georgia, serif;--qe-font-body:        'Crimson Pro', Georgia, serif;--qe-font-label:       'Courier Prime', monospace;--qe-surface:          rgba(255,255,255,0.04);--qe-border:           rgba(226,208,176,0.12);--qe-border-hi:        rgba(226,208,176,0.28);--qe-text:             #e2d0b0;--qe-text-muted:       #957e62;--qe-accent:           #c07a30;--qe-accent-lo:        rgba(192,122,48,0.08);--qe-btn-bg:           rgba(192,122,48,0.12);--qe-btn-text:         #e2d0b0;--qe-btn-hover-bg:     rgba(192,122,48,0.24);--qe-btn-hover-text:   #f0e4c8;--qe-correct:          #7ebb8a;--qe-correct-bg:       rgba(126,187,138,0.08);--qe-wrong:            #c87e7e;--qe-wrong-bg:         rgba(200,126,126,0.08);--qe-hero-bg:          transparent;--qe-hero-text:        #e2d0b0;--qe-score-color:      #c07a30;--qe-denom-color:      #957e62;--qe-bd-bg:            rgba(255,255,255,0.02);--qe-bd-border:        rgba(226,208,176,0.07);}* { margin: 0; padding: 0; box-sizing: border-box; }body {background-color: #0d0905;background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(226,208,176,0.035) 39px, rgba(226,208,176,0.035) 40px);color: #e2d0b0;font-family: 'Crimson Pro', Georgia, serif;font-size: 1.1rem;min-height: 100vh;}.container { max-width: 700px; margin: 0 auto; padding: 56px 24px 80px; }header { margin-bottom: 56px; }h1 { font-family: 'Spectral', Georgia, serif; font-size: clamp(2rem,6vw,3rem); font-weight: 600; letter-spacing: 0.01em; margin-bottom: 6px; color: #e2d0b0; }.subtitle { font-size: 0.78rem; color: #957e62; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 8px; font-family: 'Courier Prime', monospace; }
    </style>
    <link rel="stylesheet" href="../quiz-engine.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Goliath's Curse</h1>
            <div class="subtitle"></div>
        </header>
        <div id="quiz-root"></div>
    </div>

    <script>
        window.QUIZ = {
            questions: [
    {
        "text": "What is a \"Goliath\" as defined in the book?",
        "opts": [
            "A city-state ruled by a single priest-king",
            "A collection of dominance hierarchies organized through authority and violence",
            "A mythological enemy of egalitarian societies",
            "An agricultural empire that controls food surpluses"
        ],
        "ans": 1,
        "exp": "A Goliath is a collection of dominance hierarchies where individuals dominate others to control energy and labor through authority and violence."
    },
    {
        "text": "Which three simultaneous collapses drive full societal collapse?",
        "opts": [
            "Political / military / religious",
            "Agricultural / industrial / technological",
            "State / economic / population",
            "Cultural / linguistic / ecological"
        ],
        "ans": 2,
        "exp": "The book opens with state collapse combined with economic and population collapse as the triple threat that brings societies down."
    },
    {
        "text": "What is \"lamentation literature\"?",
        "opts": [
            "Ancient myths about heroic defeats",
            "Elite accounts lamenting state collapse because the powerful relied on hierarchy to extract wealth",
            "Folk songs mourning drought and famine",
            "Religious texts grieving the deaths of kings"
        ],
        "ans": 1,
        "exp": "History was often written by elites who depended on hierarchical relationships to extract wealth and power so they mourned collapse most loudly."
    },
    {
        "text": "What does Hobbes' social contract propose?",
        "opts": [
            "People give up some liberty in exchange for security",
            "People give up religion in exchange for law",
            "People give up mobility in exchange for trade",
            "People give up wealth in exchange for territory"
        ],
        "ans": 0,
        "exp": "Hobbes argued that life without authority is rife with war so people surrender some freedom for the security a state provides."
    },
    {
        "text": "What is \"veneer theory\"?",
        "opts": [
            "Elites conceal power behind bureaucracy and ritual",
            "A thin veneer of civilization shields us from a brutish state of nature",
            "Cultural practices spread superficially without deep roots",
            "States inevitably form once populations reach a threshold"
        ],
        "ans": 1,
        "exp": "Veneer theory holds that civilization is a thin surface hiding our natural brutishness underneath. The book challenges this view using paleolithic evidence."
    },
    {
        "text": "Why do the Ju/hoansi swap arrows before a hunt?",
        "opts": [
            "To equalize skill levels among hunters",
            "To perform a ritual honoring the prey",
            "To prevent accidents from misidentified arrows",
            "The arrow owner allocates the meat regardless of who fired the shot"
        ],
        "ans": 3,
        "exp": "By giving away the arrow the shooter cedes allocation rights to the owner, distributing power away from the strongest individual."
    },
    {
        "text": "The \"dark triad\" most associated with power-seeking contains which traits?",
        "opts": [
            "Psychopathy / narcissism / Machiavellianism",
            "Aggression / greed / dishonesty",
            "Dominance / status-seeking / authoritarianism",
            "Violence / deception / manipulation"
        ],
        "ans": 0,
        "exp": "Men exhibiting psychopathy / narcissism / and Machiavellianism are most likely to pursue and sustain dominance over others."
    },
    {
        "text": "What are the three \"Goliath fuels\"?",
        "opts": [
            "Gold / slaves / territory",
            "Trade / technology / ideology",
            "Agriculture / religion / warfare",
            "Lootable resources / monopolized violence / caged lands"
        ],
        "ans": 3,
        "exp": "Lootable resources / monopolized violence (horses and bronze) / and caged lands that trap populations are the core inputs that power Goliaths."
    },
    {
        "text": "Which crop type is most correlated with state formation?",
        "opts": [
            "Grains and cereals",
            "Tubers like potatoes and taro",
            "Legumes like lentils and beans",
            "Fruits and nuts"
        ],
        "ans": 0,
        "exp": "Grains are visible / storable / and easily taxed making them ideal for state extraction. Tubers are harder to seize and thus correlate with less hierarchy."
    },
    {
        "text": "\"Escape crops\" help populations evade Goliaths because they are...",
        "opts": [
            "Easily traded across long distances",
            "High-yield and self-sufficient crops grown far from settlements",
            "Perishable and easy to hide underground",
            "Crops requiring specialized knowledge to cultivate"
        ],
        "ans": 2,
        "exp": "Tubers like potatoes and taro can be left in the ground and spoil quickly making them nearly impossible for tax collectors to seize."
    },
    {
        "text": "\"Goliath's Curse\" refers to which core weakness of hierarchical societies?",
        "opts": [
            "The tendency for Goliaths to generate runaway inequality over generations",
            "The inability of unequal and extractive societies to handle disasters",
            "The moral corruption that comes with concentrated power",
            "The cycle of elite competition leading to civil war"
        ],
        "ans": 1,
        "exp": "More unequal and extractive societies have worse decision-making / less social cohesion / and heightened elite competition that makes them fragile in crises."
    },
    {
        "text": "What is \"population immiseration\"?",
        "opts": [
            "A decline in population caused by warfare",
            "Forced migration of peoples during state collapse",
            "Reduction in birth rates under authoritarian rule",
            "The impoverishment of the masses by an extractive elite class"
        ],
        "ans": 3,
        "exp": "Population immiseration describes how extractive elites systematically impoverish the broader population through a wealth pump that flows upward rather than trickling down."
    },
    {
        "text": "Who was the king of the first state in the world according to the book?",
        "opts": [
            "King Narmer of Egypt",
            "Sargon of Akkad",
            "Hong Xiuquan of China",
            "Moctezuma of the Aztecs"
        ],
        "ans": 0,
        "exp": "King Narmer unified Egypt and is considered the ruler of the world's first state. Warlords like Narmer built the first states through conquest."
    },
    {
        "text": "The book argues \"War made the state and the state made war.\" What does this mean?",
        "opts": [
            "States are fundamentally peaceful institutions that redirect aggression",
            "War eventually destroys every state that wages it",
            "War and states mutually reinforce each other in a feedback loop",
            "States emerge only after war destroys earlier societies"
        ],
        "ans": 2,
        "exp": "Warlords form states and states then wage war to expand / creating a cycle where military power and political structure co-produce each other."
    },
    {
        "text": "Sargon of Akkad was described as a \"marcher king\" because he...",
        "opts": [
            "Went city to city conquering through military campaigns",
            "Established the first march (border region) system in Mesopotamia",
            "Led ritual processions to legitimize his rule",
            "Marched armies across continents to build a vast empire"
        ],
        "ans": 0,
        "exp": "Sargon conquered city after city but struggled to maintain control due to dominance aversion and elite competition within his own ranks."
    },
    {
        "text": "What does \"mors ex machina\" mean in the context of the book?",
        "opts": [
            "A Roman myth about death caused by mechanical failure",
            "The collapse of civilization caused by advanced weaponry",
            "Death from out-of-control technology or tech-driven threats",
            "A god-like machine that decides the fates of civilizations"
        ],
        "ans": 2,
        "exp": "Contrasted with \"deus ex machina\" (a god saving the day) / mors ex machina describes death or catastrophe arising from technology we can no longer control."
    },
    {
        "text": "What is \"termination shock\" in the context of solar geoengineering?",
        "opts": [
            "Equipment failure causing geoengineering deployment to stop suddenly",
            "Rapid and severe warming if geoengineering halts while carbon levels remain high",
            "The cooling shock to ecosystems from reduced sunlight",
            "A political crisis triggered by unilateral geoengineering"
        ],
        "ans": 1,
        "exp": "If geoengineering cools the earth but is then stopped while emissions remain high / all the accumulated carbon would cause sudden whiplash warming far faster than gradual change."
    },
    {
        "text": "\"Death Star syndrome\" describes which vulnerability?",
        "opts": [
            "Global systems are resilient overall but catastrophically vulnerable to specific shocks",
            "The tendency for large empires to collapse under their own bureaucratic weight",
            "Modern states hold the power to destroy entire civilizations in an instant",
            "Interconnected supply chains amplify military power to destructive levels"
        ],
        "ans": 0,
        "exp": "Like the Death Star / our global systems are impressive and robust against most threats but carry single-point vulnerabilities that can trigger cascading collapse."
    },
    {
        "text": "The \"Somalia-Denmark rule\" highlights which concern about welfare states?",
        "opts": [
            "Failed states tend to stay failed while prosperous states remain prosperous",
            "Wealthy nations must fund poor nations to prevent global instability",
            "The gap in governance quality between nations is inherently self-perpetuating",
            "Dependence on an egalitarian welfare state may leave people unable to cope if it collapses"
        ],
        "ans": 3,
        "exp": "If we become fully dependent on sophisticated welfare and infrastructure / a collapse could leave us without the skills or resilience needed to recover."
    },
    {
        "text": "The book proposes four ways to \"kill a Goliath.\" Which set is correct?",
        "opts": [
            "Revolution / sanctions / democratic elections / free press",
            "Redistribution / disarmament / cultural reform / environmental law",
            "Decentralizing power / global governance / abolishing private property / green energy",
            "Making resources less lootable / easier exit options / tech for the many / spreading knowledge"
        ],
        "ans": 3,
        "exp": "The four paths: make lootable resources harder to monopolize / loosen borders and exit options / use technology democratically / and use knowledge to prevent history from repeating."
    }
],
            verdicts: [
                { min: 0.8, v: "Excellent",  n: "Outstanding recall." },
                { min: 0.6, v: "Good",       n: "Solid understanding." },
                { min: 0.4, v: "Fair",       n: "Worth revisiting." },
                { min: 0.0, v: "Try again",  n: "Time for a reread." }
            ]
        };
    </script>
    <script src="../quiz-engine.js"></script>
</body>
</html>
